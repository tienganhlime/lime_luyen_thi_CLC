<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIME – Luyện thi CLC</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #fff9f5;
      min-height: 100vh;
      color: #1a1a1a;
    }

    .hero {
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ffecd2 100%);
      padding: 2.5rem 1rem 3.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before { content: '📚'; position: absolute; top: 18px; left: 24px; font-size: 28px; opacity: 0.5; }
    .hero::after  { content: '✏️'; position: absolute; top: 18px; right: 24px; font-size: 28px; opacity: 0.5; }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.55);
      color: #c25a6e;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 14px; border-radius: 999px;
      margin-bottom: 10px;
    }
    .hero h1 { font-size: 26px; font-weight: 800; color: #6b2737; line-height: 1.2; }
    .hero p   { font-size: 14px; color: #a05060; margin-top: 6px; font-weight: 600; }

    .wave { display: block; width: 100%; height: 40px; margin-top: -1px; }

    main { max-width: 720px; margin: 0 auto; padding: 0 1rem 3rem; }

    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 800; color: #c25a6e;
      margin: 1.8rem 0 0.9rem;
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1.5px;
      background: linear-gradient(to right, #f7c5cb, transparent);
      border-radius: 999px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .card {
      background: #fff;
      border: 1.5px solid #fde0e5;
      border-radius: 16px;
      padding: 1.1rem 1rem;
      text-decoration: none;
      display: flex; flex-direction: column; gap: 4px;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #ff9a9e, #fad0c4);
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(255,140,150,0.18);
      border-color: #f9a8b4;
    }
    .card-num  { font-size: 11px; font-weight: 700; color: #f0a0aa; letter-spacing: 0.05em; }
    .card-name { font-size: 15px; font-weight: 800; color: #3d1a20; }
    .card-tag  { font-size: 11px; font-weight: 600; color: #c0848c; margin-top: 2px; }

    .card.review::before { background: linear-gradient(90deg, #a18cd1, #fbc2eb); }
    .card.review { border-color: #e8d8f8; }
    .card.review:hover { border-color: #c9a8ea; box-shadow: 0 8px 20px rgba(160,130,210,0.18); }
    .card.review .card-num  { color: #b89ce0; }
    .card.review .card-tag  { color: #9b7ec8; }
    .card.review .card-name { color: #2d1a40; }

    .state {
      text-align: center; padding: 2.5rem 1rem;
      font-size: 14px; font-weight: 600; color: #c0848c;
    }
    .spinner {
      width: 28px; height: 28px; margin: 0 auto 10px;
      border: 3px solid #fde0e5;
      border-top-color: #ff9a9e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center; padding: 1.5rem;
      font-size: 12px; font-weight: 600; color: #daa0aa;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .hero h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="badge">LIME English</div>
  <h1>Luyện thi CLC 🌟</h1>
  <p>Chọn bài để bắt đầu nào!</p>
</div>
<svg class="wave" viewBox="0 0 1440 40" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <path d="M0,20 C360,40 1080,0 1440,20 L1440,40 L0,40 Z" fill="#fff9f5"/>
</svg>

<main id="main">
  <div class="state" id="loading">
    <div class="spinner"></div>
    Đang tải danh sách bài...
  </div>
</main>

<footer>Made with 💖 by LIME English</footer>

<script>
  const REPO = 'tienganhlime/lime_luyen_thi_CLC';
  const API  = `https://api.github.com/repos/${REPO}/contents`;
  const BASE = `https://tienganhlime.github.io/lime_luyen_thi_CLC/`;

  function getGroup(name) {
    const n = name.toLowerCase();
    if (n.includes('tet_review') || n.includes('tet-review')) return 'review';
    return 'test';
  }

  function getLabel(name) {
    const base = name.replace('.html', '');
    const n = base.toLowerCase();
    if (n.includes('tet_review') || n.includes('tet-review')) {
      const num = base.replace(/tet.?review/i, '').trim();
      return { num: `REVIEW ${num}`, name: `Tết Review ${num}`, tag: 'Review' };
    }
    const num = base.replace(/[^0-9]/g, '');
    const displayName = base.replace(/([a-zA-Z]+)(\d+)/, '$1 $2').replace(/^./, c => c.toUpperCase()).trim();
    return {
      num: num ? `NO. ${num.padStart(2, '0')}` : base,
      name: displayName,
      tag: 'Practice Test'
    };
  }

  async function load() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`GitHub API lỗi ${res.status}`);
      const files = await res.json();

      const htmlFiles = files
        .filter(f =>
          f.type === 'file' &&
          f.name.toLowerCase().endsWith('.html') &&
          f.name.toLowerCase() !== 'index.html'
        )
        .sort((a, b) => {
          const ga = getGroup(a.name), gb = getGroup(b.name);
          if (ga !== gb) return ga === 'test' ? -1 : 1;
          return a.name.localeCompare(b.name, undefined, { numeric: true });
        });

      if (htmlFiles.length === 0) {
        document.getElementById('main').innerHTML =
          '<div class="state">Chưa có bài nào trong repo 🥲</div>';
        return;
      }

      const groups = {};
      htmlFiles.forEach(f => {
        const g = getGroup(f.name);
        if (!groups[g]) groups[g] = [];
        groups[g].push(f);
      });

      const groupConfig = {
        test:   { emoji: '📝', label: 'Practice Tests' },
        review: { emoji: '🌸', label: 'Review' },
      };

      let html = '';
      for (const [key, items] of Object.entries(groups)) {
        const cfg = groupConfig[key] || { emoji: '📄', label: key };
        html += `<div class="section-label"><span>${cfg.emoji}</span> ${cfg.label}</div><div class="grid">`;
        items.forEach(f => {
          const lbl = getLabel(f.name);
          const cls = key === 'review' ? 'card review' : 'card';
          html += `
            <a class="${cls}" href="${BASE}${f.name}">
              <div class="card-num">${lbl.num}</div>
              <div class="card-name">${lbl.name}</div>
              <div class="card-tag">${lbl.tag}</div>
            </a>`;
        });
        html += '</div>';
      }

      document.getElementById('main').innerHTML = html;

    } catch (err) {
      document.getElementById('main').innerHTML = `
        <div class="state">
          😵 Không tải được danh sách bài.<br>
          <span style="font-size:12px;color:#d08090;font-weight:400;margin-top:6px;display:block">${err.message}</span>
        </div>`;
    }
  }

  load();
</script>
</body>
</html>
